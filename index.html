<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>რეცეპტების სამყარო</title>
</head>
<body>

  <header>
    <nav>
      <ul>
        <li><a href="index.html">მთავარი</a></li>
        <li><a href="saved.html">ფავორიტები</a></li>
        <li><a href="detail.html">დეტალები</a></li>
        <li><a href="suggest.html">შეთავაზება</a></li>
        <li><a href="login.html">შესვლა</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h1>რეცეპტების სამყარო</h1>
      <p>მოძებნეთ და აღმოაჩინეთ უგემრიელესი კერძების რეცეპტები მთელი მსოფლიოდან.</p>
    </section>

    <section>
      <form>
        <div>
          <label for="search-input">ძიება:</label>
          <input type="search" id="search-input" name="query" placeholder="ჩაწერეთ კერძის დასახელება..." required>
        </div>

        <div>
          <label for="category-select">კატეგორია:</label>
          <select id="category-select" name="category">
            <option value="">ყველა კატეგორია</option>
            <option value="beef">საქონლის ხორცი</option>
            <option value="chicken">ქათმის ხორცი</option>
            <option value="dessert">დესერტი</option>
            <option value="pasta">პასტა</option>
            <option value="vegetarian">ვეგეტარიანული</option>
          </select>
        </div>

        <button type="submit">ძიება</button>
      </form>
    </section>
  </main>

  <footer>
    <p>✨ რეცეპტები მოწოდებულია TheMealDB API-დან — Web Engineering Final Project 2026</p>
  </footer>

</body>
</html>
