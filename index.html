<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>რეცეპტების სამყარო</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <ul>
        <li><a href="index.html">მთავარი</a></li>
        <li><a href="saved.html">ფავორიტები</a></li>
        <li><a href="detail.html">დეტალები</a></li>
        <li><a href="suggest.html">შეთავაზება</a></li>
        <li><a href="login.html">შესვლა</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-section">
      <h1 class="hero-title">რეცეპტების სამყარო</h1>
      <p class="hero-subtitle">მოძებნეთ და აღმოაჩინეთ უგემრიელესი კერძების რეცეპტები მთელი მსოფლიოდან.</p>
    </section>

    <section class="search-section">
      <form id="search-form" class="search-form-layout">
        <div class="search-field-group">
          <label for="search-input" class="search-label">ძიება:</label>
          <input type="search" id="search-input" name="query" placeholder="ჩაწერეთ კერძის დასახელება..." required>
        </div>

        <div class="search-field-group">
          <label for="category-select" class="search-label">კატეგორია:</label>
          <select id="category-select" name="category">
            <option value="">ყველა კატეგორია</option>
            <option value="beef">საქონლის ხორცი</option>
            <option value="chicken">ქათმის ხორცი</option>
            <option value="dessert">დესერტი</option>
            <option value="pasta">პასტა</option>
            <option value="vegetarian">ვეგეტარიანული</option>
          </select>
        </div>

        <button type="submit" class="search-btn">ძიება</button>
      </form>
    </section>

    <!-- რეცეპტების ბარათების სექცია -->
    <section class="results-section">
      <h2 class="section-title">აღმოაჩინე რეცეპტები</h2>
      <div id="results-grid" class="recipes-grid">
        <!-- მომავალში აქ ჩაიწერება რეცეპტის ბარათები დინამიურად -->
      </div>
    </section>
  </main>

  <footer>
    <p>✨ რეცეპტები მოწოდებულია TheMealDB API-დან — Web Engineering Final Project 2026</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
