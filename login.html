<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>შესვლა</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-main">
    <section class="auth-card">
        <h1 class="auth-title">შესვლა</h1>
        <form id="login-form" class="auth-form" action="index.html" method="get">
          <div class="form-group">
            <label for="email" class="form-label">ელ-ფოსტა</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="შეიყვანეთ ელ-ფოსტა" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">პაროლი</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="შეიყვანეთ პაროლი" required>
          </div>

          <button type="submit" class="form-submit-btn">შესვლა</button>
          <p id="login-feedback" class="form-feedback" hidden></p>
        </form>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
