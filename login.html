<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>შესვლა — რეცეპტების სამყარო</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-section">
    <section class="auth-card" aria-labelledby="login-title">
      <h1 id="login-title" class="auth-card__title">შესვლა</h1>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">ელ-ფოსტა</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="user@example.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label">პაროლი</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="მინიმუმ 6 სიმბოლო"
            required
            minlength="6"
          >
        </div>

        <button type="submit" class="form-submit-btn">შესვლა</button>

        <p class="form-feedback" id="login-feedback" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
